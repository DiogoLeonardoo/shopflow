spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5433/shopflow_auth
    username: postgres
    password: postgres123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health, info

app:
  jwt:
    secret: shopflow-secret-key-must-be-at-least-32-characters-long
    expiration-ms: 86400000