spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**

        - id: catalog-service
          uri: http://localhost:8082
          predicates:
            - Path=/products/**

        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/orders/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info

app:
  jwt:
    secret: shopflow-secret-key-must-be-at-least-32-characters-long